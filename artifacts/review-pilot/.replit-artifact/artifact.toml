kind = "web"
previewPath = "/"
title = "ReviewPilot AI"
version = "1.0.0"
id = "artifacts/review-pilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21541

[services.development]
run = "pnpm --filter @workspace/review-pilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/review-pilot", "run", "build" ]
publicDir = "artifacts/review-pilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21541"
BASE_PATH = "/"
